<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجهيز الرابط | Ghost Root Lab</title>
    <style>
        :root {
            --primary-color: #ff3e3e;
            --bg-color: #050505;
            --card-bg: #111;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: white; text-align: center; padding: 50px 20px; }
        .container { max-width: 600px; margin: auto; background: var(--card-bg); padding: 40px; border-radius: 10px; border: 1px solid var(--primary-color); box-shadow: 0 0 20px rgba(255, 62, 62, 0.2); }
        
        .loading-text { font-size: 20px; color: #888; margin-bottom: 20px; }
        #timer { font-size: 60px; font-weight: bold; color: var(--primary-color); margin: 25px 0; font-family: 'Courier New', monospace; }
        
        .ad-box { width: 100%; height: 250px; background: #0a0a0a; border: 1px dashed #333; margin: 20px 0; display: flex; align-items: center; justify-content: center; color: #444; }
        
        .download-btn { display: inline-block; padding: 15px 40px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 18px; transition: 0.3s; background: #333; color: #666; cursor: not-allowed; border: 1px solid #444; }
        .active-btn { background: var(--primary-color) !important; color: black !important; cursor: pointer !important; border-color: var(--primary-color) !important; box-shadow: 0 0 15px var(--primary-color); }
        
        .security-check { margin-top: 30px; font-size: 13px; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <div style="color: var(--primary-color); font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;">GHOST ROOT SYSTEM</div>
    <h2>جاري تحضير ملفك الآمن...</h2>
    <p class="loading-text">يتم الآن فحص الرابط من قبل خوارزميات Ghost Root</p>

    <div class="ad-box">
        <p>[ <script async="async" data-cfasync="false" src="https://pl29330534.profitablecpmratenetwork.com/e982e56283a62832bebf08e935b44611/invoke.js"></script>
<div id="container-e982e56283a62832bebf08e935b44611"></div>
مساحة إعلانية - ممر الأرباح ]</p>
    </div>

    <div id="timer">15</div>

    <a href="#" id="mainBtn" class="download-btn">انتظر فحص الملف...</a>

    <div class="security-check">
        ● تم فحص الملف ضد البرمجيات الخبيثة <br>
        ● الرابط مشفر ومؤمن 100%
    </div>
</div>

<script>
    let timeLeft = 15;
    const timerDisplay = document.getElementById('timer');
    const btn = document.getElementById('mainBtn');

    const countdown = setInterval(() => {
        timeLeft--;
        timerDisplay.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerDisplay.innerHTML = "جاهز!";
            btn.innerText = "تحميل الملف الآن";
            btn.classList.add('active-btn');
            btn.href = "#"; // هنا ستحط رابط الملف الفعلي لاحقاً
        }
    }, 1000);
</script>

</body>
</html>
